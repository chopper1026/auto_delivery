services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      POSTGRES_USER: auto_delivery
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: auto_delivery
    command: ["postgres", "-c", "timezone=${TZ:-Asia/Shanghai}", "-c", "log_timezone=${TZ:-Asia/Shanghai}"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_delivery -d auto_delivery"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/postgres:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-15432}:5432"

  redis:
    image: redis:8.6.3-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/redis:/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
      HTTP_ADDR: :3000
      DATABASE_URL: postgresql://auto_delivery:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/auto_delivery?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      ADMIN_USERNAME: ${ADMIN_USERNAME:?set ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      SECRET_PEPPER: ${SECRET_PEPPER:?set SECRET_PEPPER}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-auto_delivery_admin}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL}
      STORAGE_ROOT: /app/storage
      STATIC_DIR: /app/public
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./data/storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
