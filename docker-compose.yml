services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auto_delivery
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: auto_delivery
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto_delivery -d auto_delivery"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://auto_delivery:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/auto_delivery?schema=public
      ADMIN_USERNAME: ${ADMIN_USERNAME:?set ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      SECRET_PEPPER: ${SECRET_PEPPER:?set SECRET_PEPPER}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-auto_delivery_admin}
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL}
      STORAGE_ROOT: ${STORAGE_ROOT:-./storage}
      ADMIN_UPLOAD_BODY_LIMIT: ${ADMIN_UPLOAD_BODY_LIMIT:-100mb}
    ports:
      - "3000:3000"
    volumes:
      - ./data/storage:/app/storage
