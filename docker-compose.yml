services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auto_delivery
      POSTGRES_PASSWORD: auto_delivery
      POSTGRES_DB: auto_delivery
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auto_delivery
      POSTGRES_PASSWORD: auto_delivery
      POSTGRES_DB: auto_delivery_test
    ports:
      - "5433:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - app-data:/app/storage

volumes:
  postgres-data:
  postgres-test-data:
  app-data:
